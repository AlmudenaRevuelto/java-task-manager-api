# PostgreSQL config
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:postgres}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Dialect is auto-detected by Hibernate — no need to set it explicitly
# Disable open-in-view to avoid unintended DB queries during view rendering
spring.jpa.open-in-view=false

# (IMPORTANT) explicit driver declaration required by some Spring Boot + PostgreSQL setups
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT — override app.jwt.secret in production (min 32 characters)
app.jwt.secret=${JWT_SECRET:change-me-in-production-min-32-chars!!}
app.jwt.expiration-ms=86400000