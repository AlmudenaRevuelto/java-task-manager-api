server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy authentication endpoints to the Spring Boot backend
    location /auth {
        # Strip trailing slash before proxying — Spring Boot 3+ does not match /auth/login/
        rewrite ^(.+)/$ $1 break;
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
    }

    # Proxy task API endpoints to the Spring Boot backend
    location /tasks {
        # Strip trailing slash before proxying — Spring Boot 3+ does not match /tasks/
        rewrite ^(.+)/$ $1 break;
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
    }

    # Proxy admin endpoints to the Spring Boot backend (ADMIN role required on the backend)
    location /admin {
        rewrite ^(.+)/$ $1 break;
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Authorization     $http_authorization;
    }

    # Serve the React SPA; fall back to index.html so React Router handles unknown paths
    location / {
        try_files $uri $uri/ /index.html;
    }
}
